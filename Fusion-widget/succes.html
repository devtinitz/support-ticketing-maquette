<!DOCTYPE html>

<html class="light" lang="fr">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface": "#f7f9fb",
            "on-error": "#ffffff",
            "error-container": "#ffdad6",
            "on-primary-fixed-variant": "#2f2ebe",
            "surface-container-lowest": "#ffffff",
            "outline-variant": "#c7c4d7",
            "on-secondary": "#ffffff",
            "surface-bright": "#f7f9fb",
            "on-secondary-fixed-variant": "#2f3aa3",
            "error": "#ba1a1a",
            "primary-fixed-dim": "#c0c1ff",
            "secondary-fixed": "#e0e0ff",
            "primary-fixed": "#e1e0ff",
            "surface-tint": "#494bd6",
            "inverse-primary": "#c0c1ff",
            "primary": "#4648d4",
            "on-surface-variant": "#464554",
            "outline": "#767586",
            "tertiary-fixed-dim": "#4edea3",
            "primary-container": "#6063ee",
            "on-secondary-container": "#17228f",
            "tertiary-fixed": "#6ffbbe",
            "on-tertiary-container": "#000703",
            "on-tertiary-fixed-variant": "#005236",
            "on-background": "#191c1e",
            "secondary": "#4953bc",
            "on-secondary-fixed": "#000767",
            "on-primary-container": "#fffbff",
            "on-surface": "#191c1e",
            "on-primary-fixed": "#07006c",
            "inverse-surface": "#2d3133",
            "on-tertiary": "#ffffff",
            "inverse-on-surface": "#eff1f3",
            "background": "#f7f9fb",
            "surface-variant": "#e0e3e5",
            "on-primary": "#ffffff",
            "surface-container-highest": "#e0e3e5",
            "tertiary-container": "#00885d",
            "tertiary": "#006c49",
            "secondary-container": "#8792fe",
            "surface-container-low": "#f2f4f6",
            "on-tertiary-fixed": "#002113",
            "surface-container": "#eceef0",
            "surface-dim": "#d8dadc",
            "secondary-fixed-dim": "#bdc2ff",
            "surface-container-high": "#e6e8ea",
            "on-error-container": "#93000a"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "fontFamily": {
            "headline": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"]
          }
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
    }
  </style>
</head>

<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6 overflow-hidden">
  <!-- Background Mock Dashboard (Underlay) -->
  <div class="fixed inset-0 z-0 flex items-center justify-center p-8 opacity-40">
    <div
      class="w-full max-w-6xl h-full bg-white rounded-xl shadow-sm border border-outline-variant flex overflow-hidden">
      <aside class="w-64 bg-surface-container-low border-r border-outline-variant p-6 space-y-4">
        <div class="h-8 w-32 bg-surface-variant rounded"></div>
        <div class="space-y-2 pt-8">
          <div class="h-4 w-full bg-surface-variant rounded"></div>
          <div class="h-4 w-5/6 bg-surface-variant rounded"></div>
          <div class="h-4 w-4/6 bg-surface-variant rounded"></div>
        </div>
      </aside>
      <main class="flex-1 p-10">
        <div class="flex justify-between items-center mb-10">
          <div class="h-10 w-48 bg-surface-variant rounded"></div>
          <div class="h-10 w-10 bg-surface-variant rounded-full"></div>
        </div>
        <div class="grid grid-cols-3 gap-6">
          <div class="h-40 bg-surface-container rounded-xl"></div>
          <div class="h-40 bg-surface-container rounded-xl"></div>
          <div class="h-40 bg-surface-container rounded-xl"></div>
        </div>
        <div class="mt-8 h-64 bg-surface-container rounded-xl"></div>
      </main>
    </div>
  </div>
  <!-- Screen Capture Overlay Representation -->
  <div
    class="fixed inset-0 z-10 bg-primary/20 backdrop-blur-[2px] flex items-center justify-center pointer-events-none">
    <div
      class="w-[80%] h-[80%] border-2 border-dashed border-primary/40 rounded-2xl flex items-center justify-center relative">
      <div
        class="absolute top-4 left-4 bg-primary text-on-primary px-3 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase">
        Zone de capture
      </div>
    </div>
  </div>
  <!-- SupportKit Success Panel (SideNavBar variant) -->
  <div
    class="fixed right-6 bottom-24 w-[380px] h-[600px] glass-panel rounded-[12px] overflow-hidden shadow-[0_8px_24px_-4px_rgba(23,34,143,0.06)] z-50 flex flex-col">
    <!-- TopAppBar Content -->
    <header class="flex justify-between items-center px-4 py-3 bg-slate-100 dark:bg-slate-800">
      <span class="text-[1.125rem] font-medium text-slate-900 dark:text-slate-100 font-['Inter']">SupportKit</span>
      <button
        class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-200/50 dark:hover:bg-slate-700/50 transition-colors active:scale-95 duration-200 ease-in-out">
        <span class="material-symbols-outlined text-slate-500">close</span>
      </button>
    </header>
    <!-- Success Content -->
    <div class="flex-1 flex flex-col items-center justify-center p-8 text-center">
      <!-- Success Icon with Radial Glow -->
      <div class="relative mb-8">
        <div class="absolute inset-0 bg-tertiary/10 rounded-full scale-150 blur-xl"></div>
        <div
          class="w-20 h-20 bg-tertiary-fixed text-on-tertiary-fixed rounded-full flex items-center justify-center shadow-lg relative z-10">
          <span class="material-symbols-outlined text-4xl"
            style="font-variation-settings: 'FILL' 1;">check_circle</span>
        </div>
      </div>
      <!-- Text Content -->
      <div class="space-y-3 mb-10">
        <h2 class="text-[1.125rem] font-bold text-on-surface font-['Inter'] leading-tight">
          Ticket #SK-8751 créé avec succès !
        </h2>
        <p class="text-[0.875rem] text-on-surface-variant leading-relaxed px-4">
          Notre équipe de conciergerie a bien reçu votre demande. Nous reviendrons vers vous dans les plus brefs délais.
        </p>
      </div>
      <!-- Action Button -->
      <button
        class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-xl font-semibold shadow-lg hover:shadow-xl hover:scale-[1.02] active:scale-95 transition-all duration-300">
        Voir mon ticket
      </button>
      <!-- Metadata/Small labels -->
      <div class="mt-8 flex items-center gap-2 text-[0.6875rem] font-semibold uppercase tracking-wider text-outline">
        <span class="material-symbols-outlined text-sm">schedule</span>
        <span>Temps de réponse estimé : &lt; 2h</span>
      </div>
    </div>
    <!-- Navigation Placeholder from SideNavBar -->
    <nav class="flex border-t border-surface-container-high bg-slate-50">
      <div class="flex-1 py-4 flex flex-col items-center gap-1 text-slate-500">
        <a href=""></a>
        <span class="material-symbols-outlined">home</span>
        <span class="text-[10px] font-medium">Home</span>
      </div>
      <div class="flex-1 py-4 flex flex-col items-center gap-1 text-indigo-600 border-b-2 border-indigo-600">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
        <span class="text-[10px] font-bold">Messages</span>
      </div>
      <div class="flex-1 py-4 flex flex-col items-center gap-1 text-slate-500">
        <span class="material-symbols-outlined">help</span>
        <span class="text-[10px] font-medium">Help</span>
      </div>
      <div class="flex-1 py-4 flex flex-col items-center gap-1 text-slate-500">
        <span class="material-symbols-outlined">campaign</span>
        <span class="text-[10px] font-medium">News</span>
      </div>
    </nav>
  </div>
  <!-- Floating Action Button (FAB) -->
  <button
    class="fixed right-6 bottom-6 w-14 h-14 bg-gradient-to-br from-[#6366F1] to-[#818CF8] text-white rounded-full flex items-center justify-center shadow-[0_8px_24px_-4px_rgba(23,34,143,0.3)] hover:scale-105 active:scale-95 transition-all duration-300 z-[60]">
    <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
  </button>
</body>

</html>
