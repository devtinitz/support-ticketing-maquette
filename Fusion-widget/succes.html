<!DOCTYPE html>
<html class="light" lang="fr">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#f7f9fb",
            "on-error": "#ffffff",
            "error-container": "#ffdad6",
            "on-primary-fixed-variant": "#2f2ebe",
            "surface-container-lowest": "#ffffff",
            "outline-variant": "#c7c4d7",
            "on-secondary": "#ffffff",
            "surface-bright": "#f7f9fb",
            "on-secondary-fixed-variant": "#2f3aa3",
            "error": "#ba1a1a",
            "primary-fixed-dim": "#c0c1ff",
            "secondary-fixed": "#e0e0ff",
            "primary-fixed": "#e1e0ff",
            "surface-tint": "#494bd6",
            "inverse-primary": "#c0c1ff",
            "primary": "#4648d4",
            "on-surface-variant": "#464554",
            "outline": "#767586",
            "tertiary-fixed-dim": "#4edea3",
            "primary-container": "#6063ee",
            "on-secondary-container": "#17228f",
            "tertiary-fixed": "#6ffbbe",
            "on-tertiary-container": "#000703",
            "on-tertiary-fixed-variant": "#005236",
            "on-background": "#191c1e",
            "secondary": "#4953bc",
            "on-secondary-fixed": "#000767",
            "on-primary-container": "#fffbff",
            "on-surface": "#191c1e",
            "on-primary-fixed": "#07006c",
            "inverse-surface": "#2d3133",
            "on-tertiary": "#ffffff",
            "inverse-on-surface": "#eff1f3",
            "background": "#f7f9fb",
            "surface-variant": "#e0e3e5",
            "on-primary": "#ffffff",
            "surface-container-highest": "#e0e3e5",
            "tertiary-container": "#00885d",
            "tertiary": "#006c49",
            "secondary-container": "#8792fe",
            "surface-container-low": "#f2f4f6",
            "on-tertiary-fixed": "#002113",
            "surface-container": "#eceef0",
            "surface-dim": "#d8dadc",
            "secondary-fixed-dim": "#bdc2ff",
            "surface-container-high": "#e6e8ea",
            "on-error-container": "#93000a"
          },
          borderRadius: {
            "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"
          },
          fontFamily: {
            "headline": ["Inter"], "body": ["Inter"], "label": ["Inter"]
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .glass-panel {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .bg-gradient-brand { background: linear-gradient(135deg, #4648d4 0%, #6063ee 100%); }
    .nav-item { transition: all 0.2s ease; }
    .nav-item.active { color: #4648d4; }
    .nav-item.active .nav-indicator {
      width: 24px; height: 3px;
      background: #4648d4;
      border-radius: 2px;
      margin: 0 auto 2px;
    }
    .nav-indicator { width: 24px; height: 3px; margin: 0 auto 2px; }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6 overflow-hidden">

  <!-- Background Mock Dashboard -->
  <div class="fixed inset-0 z-0 flex items-center justify-center p-8 opacity-30">
    <div class="w-full max-w-6xl h-full bg-white rounded-xl shadow-sm border border-outline-variant flex overflow-hidden">
      <aside class="w-64 bg-surface-container-low border-r border-outline-variant p-6 space-y-4">
        <div class="h-8 w-32 bg-surface-variant rounded"></div>
        <div class="space-y-2 pt-8">
          <div class="h-4 w-full bg-surface-variant rounded"></div>
          <div class="h-4 w-5/6 bg-surface-variant rounded"></div>
          <div class="h-4 w-4/6 bg-surface-variant rounded"></div>
        </div>
      </aside>
      <main class="flex-1 p-10">
        <div class="flex justify-between items-center mb-10">
          <div class="h-10 w-48 bg-surface-variant rounded"></div>
          <div class="h-10 w-10 bg-surface-variant rounded-full"></div>
        </div>
        <div class="grid grid-cols-3 gap-6">
          <div class="h-40 bg-surface-container rounded-xl"></div>
          <div class="h-40 bg-surface-container rounded-xl"></div>
          <div class="h-40 bg-surface-container rounded-xl"></div>
        </div>
        <div class="mt-8 h-64 bg-surface-container rounded-xl"></div>
      </main>
    </div>
  </div>

  <!-- Screen Capture Overlay -->
  <div class="fixed inset-0 z-10 bg-primary/10 backdrop-blur-[2px] flex items-center justify-center pointer-events-none">
    <div class="w-[80%] h-[80%] border-2 border-dashed border-primary/30 rounded-2xl flex items-center justify-center relative">
      <div class="absolute top-4 left-4 bg-primary text-on-primary px-3 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase">
        Zone de capture
      </div>
    </div>
  </div>

  <!-- Widget Panel -->
  <div class="fixed right-6 bottom-24 w-[380px] h-[620px] glass-panel rounded-[16px] overflow-hidden shadow-[0_16px_40px_-8px_rgba(70,72,212,0.18),0_4px_12px_-2px_rgba(0,0,0,0.08)] z-50 flex flex-col border border-white/60">

    <!-- Header -->
    <header class="flex justify-between items-center px-5 py-4 border-b border-outline-variant/30">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-lg bg-gradient-brand flex items-center justify-center">
          <span class="material-symbols-outlined text-white text-[16px]" style="font-variation-settings:'FILL' 1;">smart_toy</span>
        </div>
        <span class="text-[1rem] font-semibold text-on-surface">SupportKit</span>
      </div>
      <button class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors active:scale-95">
        <span class="material-symbols-outlined text-outline text-[20px]">close</span>
      </button>
    </header>

    <!-- Success Content -->
    <div class="flex-1 flex flex-col items-center justify-center px-8 py-6 text-center">
      <!-- Success Icon -->
      <div class="relative mb-6">
        <div class="absolute inset-0 rounded-full scale-[2] opacity-20" style="background: radial-gradient(circle, #6ffbbe 0%, transparent 70%);"></div>
        <div class="w-20 h-20 rounded-full flex items-center justify-center relative z-10 border-4 border-white shadow-lg"
             style="background: linear-gradient(135deg, #6ffbbe 0%, #00c97a 100%);">
          <span class="material-symbols-outlined text-[#002113] text-[2.5rem]" style="font-variation-settings:'FILL' 1;">check_circle</span>
        </div>
      </div>

      <!-- Text -->
      <div class="space-y-2 mb-8">
        <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-tertiary-fixed/30 mb-2">
          <span class="text-[0.6875rem] font-bold text-on-tertiary-fixed-variant tracking-wider uppercase">Ticket créé</span>
        </div>
        <h2 class="text-[1.125rem] font-bold text-on-surface leading-tight">
          #SK-8751 soumis avec succès !
        </h2>
        <p class="text-[0.875rem] text-on-surface-variant leading-relaxed">
          Notre équipe a bien reçu votre demande et reviendra vers vous dans les meilleurs délais.
        </p>
      </div>

      <!-- Action Button -->
       <a href="detailticket.html">
      <button class="w-full py-3.5 bg-gradient-brand text-on-primary rounded-xl font-semibold text-[0.9375rem] shadow-[0_4px_16px_-2px_rgba(70,72,212,0.35)] hover:shadow-[0_6px_20px_-2px_rgba(70,72,212,0.45)] hover:scale-[1.02] active:scale-95 transition-all duration-200 mb-3">
        Voir mon ticket
      </button>
       </a>
      <a href="signalerbugue.html">
      <button class="w-full py-3 text-primary font-medium text-[0.875rem] rounded-xl hover:bg-primary/5 transition-colors">
        Créer un autre ticket
      </button>
      </a>

      <!-- Metadata -->
      <div class="mt-6 flex items-center gap-2 text-[0.6875rem] font-semibold uppercase tracking-wider text-outline">
        <span class="material-symbols-outlined text-[16px]">schedule</span>
        <span>Temps de réponse estimé : &lt; 2h</span>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="flex border-t border-outline-variant/30 bg-white/70 px-2">
      <a href="index.html" class="nav-item flex-1 py-3 flex flex-col items-center gap-0.5 text-outline hover:text-primary">
        <div class="nav-indicator"></div>
        <span class="material-symbols-outlined text-[22px]">home</span>
        <span class="text-[10px] font-semibold tracking-wider uppercase">Home</span>
      </a>
      <!-- <a href="#" class="nav-item flex-1 py-3 flex flex-col items-center gap-0.5 text-outline hover:text-primary">
        <div class="nav-indicator"></div>
        <span class="material-symbols-outlined text-[22px]">chat_bubble</span>
        <span class="text-[10px] font-semibold tracking-wider uppercase">Messages</span>
      </a> -->
      <a href="signalerbugue.html" class="nav-item flex-1 py-3 flex flex-col items-center gap-0.5 text-outline hover:text-primary">
        <div class="nav-indicator"></div>
        <span class="material-symbols-outlined text-[22px]">help</span>
        <span class="text-[10px] font-semibold tracking-wider uppercase">Help</span>
      </a>
      <!-- <a href="#" class="nav-item flex-1 py-3 flex flex-col items-center gap-0.5 text-outline hover:text-primary">
        <div class="nav-indicator"></div>
        <span class="material-symbols-outlined text-[22px]">campaign</span>
        <span class="text-[10px] font-semibold tracking-wider uppercase">News</span>
      </a> -->
    </nav>
  </div>

  <!-- FAB -->
  <button class="fixed right-6 bottom-6 w-14 h-14 bg-gradient-brand text-white rounded-full flex items-center justify-center shadow-[0_8px_24px_-4px_rgba(70,72,212,0.35)] hover:scale-105 active:scale-95 transition-all duration-200 z-[60]">
    <span class="material-symbols-outlined text-2xl" style="font-variation-settings:'FILL' 1;">smart_toy</span>
  </button>
</body>
</html>
